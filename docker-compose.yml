services:
  app:
    build: .
    image: realtime-voice-chat:latest
    container_name: realtime-voice-chat-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_AUDIO_QUEUE_SIZE=${MAX_AUDIO_QUEUE_SIZE:-50}
      - HF_HOME=/home/appuser/.cache/huggingface
      - TORCH_HOME=/home/appuser/.cache/torch
      # Tells PyTorch to use MPS (Apple Silicon GPU) when available
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    volumes:
      - huggingface_cache:/home/appuser/.cache/huggingface
      - torch_cache:/home/appuser/.cache/torch
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: realtime-voice-chat-ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Enable Metal GPU acceleration on Apple Silicon
      - OLLAMA_NUM_GPU=1
    # Pull the model on first start, then serve
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull batiai/qwen3.5-9b:q4 && wait"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s   # extra time for first-run model pull
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  huggingface_cache:
    driver: local
  torch_cache:
    driver: local